extends: state/common.yaml
fields:
  combat:
    fields:
      player:
        fields:
          hp:
            transform: hp_pair
            paths: [combat.player.current_hp, combat.player.max_hp]
          block: combat.player.block
          energy: combat.player.energy
          stars: combat.player.stars
          powers:
            list: combat.player.powers
            item:
              fields:
                name: name
                power_id: power_id
                amount: amount
                is_debuff: is_debuff
      incoming_damage:
        transform: incoming_damage
      enemies:
        list: combat.enemies
        item:
          fields:
            index: index
            name: name
            hp:
              transform: hp_pair
              paths: [current_hp, max_hp]
            block: block
            intents:
              transform: intent_summary
            powers:
              list: powers
              item:
                fields:
                  name: name
                  power_id: power_id
                  amount: amount
                  is_debuff: is_debuff
      playable:
        list: combat.hand
        where: playable
        item:
          transform: card_action
      piles:
        transform: piles
  deck:
    transform: deck
  potions:
    transform: potions
